apiVersion: apps/v1
kind: Deployment
metadata:
  name: praveen-devops-page
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: praveen-devops-page
  template:
    metadata:
      labels:
        app: praveen-devops-page
    spec:
      containers:
      - name: praveen-devops-page
        image: praveen1351/devops-page:f7702880d0c856922da6c6cba3da917d6b8eb3c8
        ports:
        - containerPort: 80
