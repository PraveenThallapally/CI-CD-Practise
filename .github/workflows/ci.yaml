name: CI
 
on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
 
env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devops-page
 
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Lint HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          extra: --ignore-re "google.*fonts"
 
  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      # Build the image on every PR and push, just to catch Dockerfile
      # errors early. It is NOT pushed to the registry here.
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max
 
  push:
    # Only runs once code is actually on main — never for pull_request events
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set image tag
        id: meta
        run: echo "sha_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
 
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      # Build once, tag immutably with the commit SHA (never rely on
      # "latest" for deployments — dev/qa/prod all promote this exact tag)
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
