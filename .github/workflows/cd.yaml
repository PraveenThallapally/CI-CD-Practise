name: CD - Update Dev Image Tag
 
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [ "main" ]
 
jobs:
  update-dev-manifest:
    # only proceed if the CI run this was triggered by actually succeeded
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
 
      - name: Get the image tag (commit SHA) that CI just pushed
        id: vars
        run: echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
 
      - name: Update image tag in dev manifest
        run: |
          sed -i "s|image: .*devops-page:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/devops-page:${{ steps.vars.outputs.sha }}|" k8s/dev/deployment.yaml
          cat k8s/dev/deployment.yaml
 
      - name: Commit and push the updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/dev/deployment.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(cd): update dev image to ${{ steps.vars.outputs.sha }}"
          git push origin main
